# -----------------------------------------------------------------------------
# CI workflow — Sport Activity API, GraphQL API, and cross-browser Web UI tests.
#
# Two ways to trigger:
#   1. AUTOMATIC (push / pull_request): runs the full matrix in parallel
#      (sportActivity + graphql + web-chrome + web-firefox).
#   2. MANUAL (workflow_dispatch): pick a suite from a dropdown:
#        all             → every suite in parallel
#        sportActivity   → REST API only
#        graphql         → GraphQL API only
#        web-chrome      → Selenium + Cucumber, Chrome only
#        web-firefox     → Selenium + Cucumber, Firefox only
#
# Secret injection: each web/api job copies config.properties.example →
# config.properties and sed-injects only the secrets it needs. Required
# secrets are documented in the README.
# -----------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sportActivity
          - graphql
          - web-chrome
          - web-firefox

jobs:
  # ------------------------------------------------------------------
  # REST API — Sport Activity
  # ------------------------------------------------------------------
  sport-activity-tests:
    name: REST API - Sport Activity
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'sportActivity' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare config.properties from template
        run: cp src/resources/config.properties.example src/resources/config.properties

      - name: Inject secrets into config.properties
        env:
          SPORT_API_EMAIL: ${{ secrets.SPORT_API_EMAIL }}
          SPORT_API_PASSWORD: ${{ secrets.SPORT_API_PASSWORD }}
        run: |
          sed -i \
            -e "s|^email=.*|email=${SPORT_API_EMAIL}|" \
            -e "s|^password=.*|password=${SPORT_API_PASSWORD}|" \
            src/resources/config.properties

      - name: Run Sport Activity suite
        run: ./gradlew sportActivityTest --no-daemon

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sport-activity-report
          path: |
            build/reports/tests/sportActivityTest/
            build/test-results/sportActivityTest/

  # ------------------------------------------------------------------
  # GraphQL API — all modules
  # ------------------------------------------------------------------
  graphql-tests:
    name: GraphQL API
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'graphql' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare config.properties from template
        run: cp src/resources/config.properties.example src/resources/config.properties

      - name: Inject secrets into config.properties
        env:
          LMS_ADMIN_EMAIL: ${{ secrets.LMS_ADMIN_EMAIL }}
          LMS_ADMIN_PASSWORD: ${{ secrets.LMS_ADMIN_PASSWORD }}
          GRAPHQL_BASIC_USERNAME: ${{ secrets.GRAPHQL_BASIC_USERNAME }}
          GRAPHQL_BASIC_PASSWORD: ${{ secrets.GRAPHQL_BASIC_PASSWORD }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
        run: |
          sed -i \
            -e "s|^emailWeb=.*|emailWeb=${LMS_ADMIN_EMAIL}|" \
            -e "s|^passwordWeb=.*|passwordWeb=${LMS_ADMIN_PASSWORD}|" \
            -e "s|^usernameGraphQL=.*|usernameGraphQL=${GRAPHQL_BASIC_USERNAME}|" \
            -e "s|^passwordGraphQL=.*|passwordGraphQL=${GRAPHQL_BASIC_PASSWORD}|" \
            -e "s|^companyId=.*|companyId=${COMPANY_ID}|" \
            src/resources/config.properties

      - name: Run GraphQL suite
        run: ./gradlew graphqlTest --no-daemon

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graphql-report
          path: |
            build/reports/tests/graphqlTest/
            build/test-results/graphqlTest/

  # ------------------------------------------------------------------
  # Web UI — Chrome (Selenium + Cucumber)
  # ------------------------------------------------------------------
  web-tests-chrome:
    name: Web UI - Chrome
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'web-chrome' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare config.properties from template
        run: cp src/resources/config.properties.example src/resources/config.properties

      - name: Inject secrets into config.properties
        env:
          LMS_ADMIN_EMAIL: ${{ secrets.LMS_ADMIN_EMAIL }}
          LMS_ADMIN_PASSWORD: ${{ secrets.LMS_ADMIN_PASSWORD }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
        run: |
          sed -i \
            -e "s|^emailWeb=.*|emailWeb=${LMS_ADMIN_EMAIL}|" \
            -e "s|^passwordWeb=.*|passwordWeb=${LMS_ADMIN_PASSWORD}|" \
            -e "s|^companyId=.*|companyId=${COMPANY_ID}|" \
            src/resources/config.properties

      - name: Run Web UI suite (Chrome, headless)
        run: ./gradlew webTestChrome --no-daemon -Dheadless=true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-report-chrome
          path: |
            build/reports/tests/webTestChrome/
            build/test-results/webTestChrome/
            build/cucumber-reports/

  # ------------------------------------------------------------------
  # Web UI — Firefox (cross-browser coverage)
  # ------------------------------------------------------------------
  web-tests-firefox:
    name: Web UI - Firefox
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'web-firefox' }}
    runs-on: ubuntu-latest
    # Firefox is best-effort: Cloudflare bot protection blocks headless
    # geckodriver more aggressively than headless Chrome, so scenarios that hit
    # /admin/employee occasionally time out. Failures don't fail the CI run.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Firefox
        # ubuntu-latest usually ships Firefox pre-installed; this step guarantees
        # a specific stable build and also handles self-hosted runners.
        uses: browser-actions/setup-firefox@v1

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare config.properties from template
        run: cp src/resources/config.properties.example src/resources/config.properties

      - name: Inject secrets into config.properties
        env:
          LMS_ADMIN_EMAIL: ${{ secrets.LMS_ADMIN_EMAIL }}
          LMS_ADMIN_PASSWORD: ${{ secrets.LMS_ADMIN_PASSWORD }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
        run: |
          sed -i \
            -e "s|^emailWeb=.*|emailWeb=${LMS_ADMIN_EMAIL}|" \
            -e "s|^passwordWeb=.*|passwordWeb=${LMS_ADMIN_PASSWORD}|" \
            -e "s|^companyId=.*|companyId=${COMPANY_ID}|" \
            src/resources/config.properties

      - name: Run Web UI suite (Firefox, headless)
        run: ./gradlew webTestFirefox --no-daemon -Dheadless=true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-report-firefox
          path: |
            build/reports/tests/webTestFirefox/
            build/test-results/webTestFirefox/
            build/cucumber-reports/
