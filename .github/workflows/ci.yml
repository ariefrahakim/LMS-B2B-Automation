# -----------------------------------------------------------------------------
# CI workflow — Sport Activity API, GraphQL API, and Selenium/BDD Web UI tests.
#
# Two ways to trigger:
#   1. AUTOMATIC (push / pull_request): runs the full matrix in parallel.
#   2. MANUAL (workflow_dispatch): pick a suite from a dropdown.
#
# Secrets injection
# -----------------
# The repo's `src/resources/config.properties` is a template with placeholders.
# Before running tests, the "Inject secrets" step overwrites the sensitive
# fields with the values stored in GitHub → Settings → Secrets and variables
# → Actions. Required secrets:
#
#   LMS_ADMIN_EMAIL          → replaces  emailWeb
#   LMS_ADMIN_PASSWORD       → replaces  passwordWeb
#   GRAPHQL_BASIC_USERNAME   → replaces  usernameGraphQL
#   GRAPHQL_BASIC_PASSWORD   → replaces  passwordGraphQL
#   SPORT_API_EMAIL          → replaces  email
#   SPORT_API_PASSWORD       → replaces  password
#   COMPANY_ID               → replaces  companyId
#
# Non-sensitive values (baseUrl, url, webUrl, companySlug) stay in the file.
# -----------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sportActivity
          - graphql
          - web

jobs:
  # ------------------------------------------------------------------
  # REST API — Sport Activity
  # ------------------------------------------------------------------
  sport-activity-tests:
    name: REST API - Sport Activity
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'sportActivity' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject secrets into config.properties
        env:
          SPORT_API_EMAIL: ${{ secrets.SPORT_API_EMAIL }}
          SPORT_API_PASSWORD: ${{ secrets.SPORT_API_PASSWORD }}
        run: |
          sed -i \
            -e "s|^email=.*|email=${SPORT_API_EMAIL}|" \
            -e "s|^password=.*|password=${SPORT_API_PASSWORD}|" \
            src/resources/config.properties

      - name: Run Sport Activity suite
        run: ./gradlew sportActivityTest --no-daemon

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sport-activity-report
          path: |
            build/reports/tests/sportActivityTest/
            build/test-results/sportActivityTest/

  # ------------------------------------------------------------------
  # GraphQL API — all modules
  # ------------------------------------------------------------------
  graphql-tests:
    name: GraphQL API
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'graphql' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject secrets into config.properties
        env:
          LMS_ADMIN_EMAIL: ${{ secrets.LMS_ADMIN_EMAIL }}
          LMS_ADMIN_PASSWORD: ${{ secrets.LMS_ADMIN_PASSWORD }}
          GRAPHQL_BASIC_USERNAME: ${{ secrets.GRAPHQL_BASIC_USERNAME }}
          GRAPHQL_BASIC_PASSWORD: ${{ secrets.GRAPHQL_BASIC_PASSWORD }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
        run: |
          sed -i \
            -e "s|^emailWeb=.*|emailWeb=${LMS_ADMIN_EMAIL}|" \
            -e "s|^passwordWeb=.*|passwordWeb=${LMS_ADMIN_PASSWORD}|" \
            -e "s|^usernameGraphQL=.*|usernameGraphQL=${GRAPHQL_BASIC_USERNAME}|" \
            -e "s|^passwordGraphQL=.*|passwordGraphQL=${GRAPHQL_BASIC_PASSWORD}|" \
            -e "s|^companyId=.*|companyId=${COMPANY_ID}|" \
            src/resources/config.properties

      - name: Run GraphQL suite
        run: ./gradlew graphqlTest --no-daemon

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graphql-report
          path: |
            build/reports/tests/graphqlTest/
            build/test-results/graphqlTest/

  # ------------------------------------------------------------------
  # Web UI — Selenium + Cucumber (headless Chrome)
  # ------------------------------------------------------------------
  web-tests:
    name: Web UI - Selenium + Cucumber
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'web' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Chrome
        # GitHub-hosted ubuntu-latest already has Chrome; this step ensures it
        # on self-hosted runners as well.
        uses: browser-actions/setup-chrome@v1

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject secrets into config.properties
        env:
          LMS_ADMIN_EMAIL: ${{ secrets.LMS_ADMIN_EMAIL }}
          LMS_ADMIN_PASSWORD: ${{ secrets.LMS_ADMIN_PASSWORD }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
        run: |
          sed -i \
            -e "s|^emailWeb=.*|emailWeb=${LMS_ADMIN_EMAIL}|" \
            -e "s|^passwordWeb=.*|passwordWeb=${LMS_ADMIN_PASSWORD}|" \
            -e "s|^companyId=.*|companyId=${COMPANY_ID}|" \
            src/resources/config.properties

      - name: Run Web UI suite (headless)
        run: ./gradlew webTest --no-daemon -Dheadless=true

      - name: Upload reports (TestNG + Cucumber)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-report
          path: |
            build/reports/tests/webTest/
            build/test-results/webTest/
            build/cucumber-reports/
